<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>パート勤務 収入計算ツール</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="収入計算" />
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>*{box-sizing:border-box;}body{margin:0;padding:0;background:#f0f4ff;}input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{opacity:1;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useMemo,useEffect}=React;
const IconBase=({d,size=20,color='currentColor'})=>(
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>
    {[].concat(d).map((path,i)=><path key={i} d={path}/>)}
  </svg>
);
const CalIcon=(p)=><IconBase {...p} d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/>;
const DolIcon=(p)=><IconBase {...p} d={["M12 2v20","M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"]}/>;
const ClkIcon=(p)=><IconBase {...p} d={["M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2","M12 6v6l4 2"]}/>;
const TrdIcon=(p)=><IconBase {...p} d="M22 7 13.5 15.5 8.5 10.5 2 17M22 7h-6M22 7v6"/>;
const SetIcon=(p)=><IconBase {...p} d={["M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6","M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"]}/>;
const XIcon=(p)=><IconBase {...p} d={["M18 6 6 18","M6 6l12 12"]}/>;

const DS={hourlyWage:1560,workHours:5,workDays:[1,2,4,5],includeYearEnd:true,yearEndStart:30,yearStartEnd:3,includeNationalHolidays:true,customRestDays:[],paymentDelay:1,commuteDistance:0,commuteRate:20};
const DL=['日','月','火','水','木','金','土'];
const DLF=['日曜','月曜','火曜','水曜','木曜','金曜','土曜'];
const SK='workCalc_v4';

const Toggle=({value,onChange})=>(
  <div onClick={onChange} style={{width:'44px',height:'24px',borderRadius:'12px',position:'relative',background:value?'#6366f1':'#d1d5db',transition:'background 0.2s',cursor:'pointer',flexShrink:0}}>
    <div style={{position:'absolute',top:'3px',left:value?'22px':'3px',width:'18px',height:'18px',borderRadius:'50%',background:'white',transition:'left 0.2s',boxShadow:'0 1px 4px rgba(0,0,0,0.2)'}}/>
  </div>
);
const StepInput=({value,onChange,borderColor})=>(
  <div style={{display:'flex',alignItems:'center',gap:'3px'}}>
    <button onClick={()=>onChange(Math.max(0,value-1))} style={{width:'24px',height:'24px',background:'#fee2e2',border:'none',borderRadius:'5px',color:'#dc2626',fontWeight:'800',cursor:'pointer',fontSize:'14px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>−</button>
    <input type="number" value={value||''} onChange={e=>onChange(e.target.value===''?0:Math.max(0,Number(e.target.value)))} style={{width:'36px',padding:'3px 2px',textAlign:'center',border:`1.5px solid ${borderColor}`,borderRadius:'5px',fontSize:'12px',minWidth:0}} placeholder="0"/>
    <button onClick={()=>onChange(value+1)} style={{width:'24px',height:'24px',background:'#dcfce7',border:'none',borderRadius:'5px',color:'#16a34a',fontWeight:'800',cursor:'pointer',fontSize:'14px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>+</button>
  </div>
);

const App=()=>{
  const[year,setYear]=useState(2026);
  const[allYearsData,setAllYearsData]=useState({});
  const[settings,setSettings]=useState(DS);
  const[showSettings,setShowSettings]=useState(false);
  const[draft,setDraft]=useState(DS);
  const[loaded,setLoaded]=useState(false);

  useEffect(()=>{
    try{const r=localStorage.getItem(SK);if(r){const p=JSON.parse(r);if(p.year)setYear(Number(p.year));if(p.allYearsData)setAllYearsData(p.allYearsData);if(p.settings)setSettings({...DS,...p.settings});}}catch(e){}
    setLoaded(true);
  },[]);
  useEffect(()=>{if(!loaded)return;try{localStorage.setItem(SK,JSON.stringify({year,allYearsData,settings}));}catch(e){};},[year,allYearsData,settings,loaded]);

  const getHolidays=(y)=>{
    const h=[];
    [{m:0,d:1},{m:1,d:11},{m:1,d:23},{m:3,d:29},{m:4,d:3},{m:4,d:4},{m:4,d:5},{m:7,d:11},{m:10,d:3},{m:10,d:23}].forEach(x=>h.push(new Date(y,x.m,x.d)));
    const mon=(mo,wk)=>{const d=new Date(y,mo,1);while(d.getDay()!==1)d.setDate(d.getDate()+1);d.setDate(d.getDate()+(wk-1)*7);return new Date(d);};
    h.push(mon(0,2),mon(6,3),mon(8,3),mon(9,2));
    h.push(new Date(y,2,Math.floor(20.8431+0.242194*(y-1980)-Math.floor((y-1980)/4))));
    h.push(new Date(y,8,Math.floor(23.2488+0.242194*(y-1980)-Math.floor((y-1980)/4))));
    const subs=[];h.forEach(hd=>{if(hd.getDay()===0){let s=new Date(hd);s.setDate(s.getDate()+1);while(h.some(x=>x.toDateString()===s.toDateString()))s.setDate(s.getDate()+1);subs.push(new Date(s));}});
    const nats=[];const sorted=[...h,...subs].sort((a,b)=>a-b);
    for(let i=0;i<sorted.length-1;i++){const diff=Math.floor((sorted[i+1]-sorted[i])/86400000);if(diff===2){const m=new Date(sorted[i]);m.setDate(m.getDate()+1);if(m.getDay()!==0&&m.getDay()!==6)nats.push(new Date(m));}}
    return[...h,...subs,...nats];
  };
  const getYEH=(y,cfg=settings)=>{const days=[];for(let d=cfg.yearEndStart;d<=31;d++)days.push(new Date(y,11,d));for(let d=2;d<=cfg.yearStartEnd;d++)days.push(new Date(y,0,d));return days;};
  const isHol=(date,hols,yeh,cfg)=>{
    if(!cfg.workDays.includes(date.getDay()))return true;
    const ds=date.toDateString();
    if(cfg.includeNationalHolidays&&hols.some(h=>h.toDateString()===ds))return true;
    if(cfg.includeYearEnd&&yeh.some(h=>h.toDateString()===ds))return true;
    if(cfg.customRestDays.some(r=>new Date(date.getFullYear(),r.month-1,r.day).toDateString()===ds))return true;
    return false;
  };
  const monthlyData=allYearsData[year]||{};

  const sched=useMemo(()=>{
    const hols=getHolidays(year),yeh=getYEH(year,settings);
    const{hourlyWage:hw,workHours:wh}=settings;
    const monthly=[];let tWD=0,tD=0,tHC=0;
    for(let mo=0;mo<12;mo++){
      const last=new Date(year,mo+1,0);let wd=0,hc=0;tD+=last.getDate();
      for(let d=1;d<=last.getDate();d++){
        const date=new Date(year,mo,d),dow=date.getDay(),ds=date.toDateString();
        const isNH=hols.some(h=>h.toDateString()===ds)||yeh.some(h=>h.toDateString()===ds);
        if(isNH&&![0,6].includes(dow)&&settings.workDays.includes(dow))hc++;
        if(!isHol(date,hols,yeh,settings))wd++;
      }
      tWD+=wd;tHC+=hc;
      const mk=mo+1,sv=monthlyData[mk]||{};
      const otMin=Number(sv.overtimeMinutes)||0,hdD=Number(sv.holidayDays)||0,abD=Number(sv.absentDays)||0;
      const fa=sv.finalAmount!=null?Number(sv.finalAmount):null,si=Number(sv.sideIncome)||0;
      const co=sv.commuteOverride!=null?Number(sv.commuteOverride):null;
      const awd=Math.max(0,wd-abD),base=awd*wh*hw,abDed=abD*wh*hw;
      const otInc=Math.round(hw*1.25/6*otMin),hdInc=Math.round(hw*1.35*wh*hdD);
      const autoCom=Math.round(settings.commuteDistance*2*(settings.commuteRate||20)*awd);
      const comInc=co!==null?co:autoCom;
      const calc=base+otInc+hdInc,part=fa!==null?fa:calc;
      monthly.push({month:mk,workDays:wd,actualWorkDays:awd,absentDays:abD,overtimeMinutes:otMin,holidayDays:hdD,baseIncome:base,absentDeduct:abDed,overtimeIncome:otInc,holidayIncome:hdInc,autoCommute:autoCom,commuteIncome:comInc,commuteOverride:co,calculated:calc,finalAmount:fa,partIncome:part,sideIncome:si,total:part+si+comInc});
    }
    const tPart=monthly.reduce((s,m)=>s+m.partIncome,0),tSide=monthly.reduce((s,m)=>s+m.sideIncome,0),tCom=monthly.reduce((s,m)=>s+m.commuteIncome,0),tTotal=tPart+tSide+tCom;
    const delay=settings.paymentDelay||0;
    let ppI=0,psI=0,pcI=0;
    if(delay===0){ppI=tPart;psI=tSide;pcI=tCom;}
    else{
      monthly.filter(m=>m.month<=12-delay).forEach(m=>{ppI+=m.partIncome;psI+=m.sideIncome;pcI+=m.commuteIncome;});
      const pyd=allYearsData[year-1]||{};
      for(let pm=13-delay;pm<=12;pm++){
        const ph=getHolidays(year-1),pye=getYEH(year-1,settings),last=new Date(year-1,pm,0);let pw=0;
        for(let d=1;d<=last.getDate();d++){if(!isHol(new Date(year-1,pm-1,d),ph,pye,settings))pw++;}
        const sv=pyd[pm]||{},pAbs=Number(sv.absentDays)||0,pawd=Math.max(0,pw-pAbs);
        const pf=sv.finalAmount!=null?Number(sv.finalAmount):null,pb=pawd*wh*hw;
        const poI=Math.round(hw*1.25/6*(Number(sv.overtimeMinutes)||0)),phI=Math.round(hw*1.35*wh*(Number(sv.holidayDays)||0));
        ppI+=pf!==null?pf:pb+poI+phI;psI+=Number(sv.sideIncome)||0;
        const pac=Math.round(settings.commuteDistance*2*(settings.commuteRate||20)*pawd);
        pcI+=sv.commuteOverride!=null?Number(sv.commuteOverride):pac;
      }
    }
    const ptTotal=ppI+psI+pcI;
    return{monthly,yearly:{workDays:tWD,totalDays:tD,totalHolidays:tD-tWD,nationalHolidays:tHC,partIncome:tPart,sideIncome:tSide,commuteIncome:tCom,totalIncome:tTotal,payPartIncome:ppI,paySideIncome:psI,payCommuteIncome:pcI,payTotalIncome:ptTotal,average:Math.round(ptTotal/12),delay}};
  },[year,monthlyData,settings]);

  const calcFuture=(ty)=>{
    const delay=settings.paymentDelay||0;
    const getWd=(ty2,mo)=>{const h=getHolidays(ty2),ye=getYEH(ty2,settings),last=new Date(ty2,mo,0);let wd=0;for(let d=1;d<=last.getDate();d++){if(!isHol(new Date(ty2,mo-1,d),h,ye,settings))wd++;}return wd;};
    let total=0;
    if(delay===0){for(let m=1;m<=12;m++)total+=getWd(ty,m);}
    else{for(let m=13-delay;m<=12;m++)total+=getWd(ty-1,m);for(let m=1;m<=12-delay;m++)total+=getWd(ty,m);}
    return total*settings.workHours*settings.hourlyWage;
  };
  const futureYears=[1,2,3,4,5].map(o=>({y:year+o,income:calcFuture(year+o)}));
  const fmt=n=>n.toLocaleString('ja-JP');
  const updM=(month,field,value)=>setAllYearsData(prev=>({...prev,[year]:{...prev[year],[month]:{...prev[year]?.[month],[field]:value}}}));
  const openSet=()=>{setDraft({...settings});setShowSettings(true);};
  const applySet=()=>{if(draft.workDays.length===0)return;setSettings(draft);setShowSettings(false);};
  const wdLabel=settings.workDays.map(d=>DL[d]).join('・')+'曜日';

  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#f0f4ff 0%,#e8ecff 50%,#f5f0ff 100%)',padding:'12px',fontFamily:"'Hiragino Sans','Yu Gothic',sans-serif"}}>
    <div style={{maxWidth:'900px',margin:'0 auto'}}>

    {/* Header */}
    <div style={{background:'white',borderRadius:'16px',boxShadow:'0 4px 24px rgba(99,102,241,0.10)',padding:'16px',marginBottom:'12px'}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:'12px'}}>
        <div>
          <h1 style={{fontSize:'20px',fontWeight:'800',color:'#1e1b4b',margin:0,display:'flex',alignItems:'center',gap:'10px'}}><CalIcon size={24} color="#6366f1"/>パート勤務 収入計算ツール</h1>
          <p style={{color:'#6b7280',marginTop:'6px',fontSize:'12px',lineHeight:'1.6'}}>勤務日:{wdLabel}　{settings.workHours}時間／日　時給¥{fmt(settings.hourlyWage)}{settings.paymentDelay>0&&<span>　{['','翌月','翌々月'][settings.paymentDelay]}払い</span>}</p>
        </div>
        <button onClick={openSet} style={{display:'flex',alignItems:'center',gap:'6px',padding:'10px 16px',background:'#f0f0ff',border:'1.5px solid #c7d2fe',borderRadius:'10px',color:'#4f46e5',fontWeight:'600',fontSize:'13px',cursor:'pointer',whiteSpace:'nowrap'}}><SetIcon size={16} color="#4f46e5"/> 設定変更</button>
      </div>
      <div style={{marginTop:'14px',display:'flex',alignItems:'center',gap:'12px'}}>
        <label style={{fontSize:'13px',color:'#6b7280',fontWeight:'600'}}>計算対象年</label>
        <input type="number" value={year} onChange={e=>setYear(parseInt(e.target.value))} style={{padding:'8px 12px',border:'1.5px solid #c7d2fe',borderRadius:'8px',fontSize:'15px',fontWeight:'700',color:'#1e1b4b',width:'96px',outline:'none'}} min="2020" max="2050"/>
      </div>
    </div>

    {/* Settings Modal */}
    {showSettings&&(
      <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'}}>
      <div style={{background:'white',borderRadius:'20px',padding:'24px',maxWidth:'460px',width:'100%',boxShadow:'0 20px 60px rgba(0,0,0,0.2)',maxHeight:'90vh',overflowY:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px'}}>
          <h2 style={{margin:0,fontSize:'18px',fontWeight:'800',color:'#1e1b4b',display:'flex',alignItems:'center',gap:'8px'}}><SetIcon size={18} color="#6366f1"/> 勤務条件の設定</h2>
          <button onClick={()=>setShowSettings(false)} style={{background:'none',border:'none',cursor:'pointer',color:'#9ca3af'}}><XIcon size={22}/></button>
        </div>
        <div style={{marginBottom:'20px'}}>
          <label style={{display:'block',fontSize:'13px',fontWeight:'700',color:'#374151',marginBottom:'8px'}}>時給（円）</label>
          <input type="number" value={draft.hourlyWage} onChange={e=>setDraft(p=>({...p,hourlyWage:Number(e.target.value)}))} style={{padding:'10px 12px',border:'1.5px solid #d1d5db',borderRadius:'8px',fontSize:'16px',width:'140px',fontWeight:'700'}} min="0"/>
        </div>
        <div style={{marginBottom:'20px'}}>
          <label style={{display:'block',fontSize:'13px',fontWeight:'700',color:'#374151',marginBottom:'8px'}}>1日の勤務時間（時間）</label>
          <input type="number" value={draft.workHours} onChange={e=>setDraft(p=>({...p,workHours:Number(e.target.value)}))} style={{padding:'10px 12px',border:'1.5px solid #d1d5db',borderRadius:'8px',fontSize:'16px',width:'100px',fontWeight:'700'}} min="0.5" max="24" step="0.5"/>
        </div>
        <div style={{marginBottom:'20px'}}>
          <label style={{display:'block',fontSize:'13px',fontWeight:'700',color:'#374151',marginBottom:'8px'}}>勤務曜日（複数選択可）</label>
          <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
            {[0,1,2,3,4,5,6].map(d=>(
              <button key={d} onClick={()=>setDraft(p=>({...p,workDays:p.workDays.includes(d)?p.workDays.filter(x=>x!==d):[...p.workDays,d].sort()}))}
                style={{width:'42px',height:'42px',borderRadius:'50%',border:'2px solid',borderColor:draft.workDays.includes(d)?'#6366f1':'#e5e7eb',background:draft.workDays.includes(d)?'#6366f1':'white',color:draft.workDays.includes(d)?'white':'#6b7280',fontWeight:'700',fontSize:'14px',cursor:'pointer'}}>
                {DL[d]}
              </button>
            ))}
          </div>
          {draft.workDays.length===0&&<p style={{color:'#ef4444',fontSize:'12px',marginTop:'6px'}}>※ 勤務日を1日以上選択してください</p>}
          <p style={{color:'#9ca3af',fontSize:'12px',marginTop:'6px'}}>選択中: {draft.workDays.length>0?draft.workDays.map(d=>DLF[d]).join('・'):'なし'}</p>
        </div>
        <div style={{marginBottom:'20px'}}>
          <label style={{display:'block',fontSize:'13px',fontWeight:'700',color:'#374151',marginBottom:'8px'}}>支払いタイミング</label>
          <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
            {[{val:0,label:'当月払い'},{val:1,label:'翌月払い'},{val:2,label:'翌々月払い'}].map(({val,label})=>(
              <button key={val} onClick={()=>setDraft(p=>({...p,paymentDelay:val}))}
                style={{padding:'8px 14px',borderRadius:'8px',border:'1.5px solid',borderColor:draft.paymentDelay===val?'#6366f1':'#e5e7eb',background:draft.paymentDelay===val?'#6366f1':'white',color:draft.paymentDelay===val?'white':'#6b7280',fontWeight:'600',fontSize:'13px',cursor:'pointer'}}>
                {label}
              </button>
            ))}
          </div>
          {draft.paymentDelay>0&&<p style={{fontSize:'11px',color:'#6366f1',marginTop:'6px'}}>年間集計は前年{13-draft.paymentDelay}月〜当年{12-draft.paymentDelay}月分の受取額になります</p>}
        </div>
        <div style={{marginBottom:'20px'}}>
          <label style={{display:'block',fontSize:'13px',fontWeight:'700',color:'#374151',marginBottom:'8px'}}>通勤距離・単価</label>
          <div style={{display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'}}>
            <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
              <input type="number" value={draft.commuteDistance||''} onChange={e=>setDraft(p=>({...p,commuteDistance:e.target.value===''?0:Number(e.target.value)}))} style={{padding:'10px 12px',border:'1.5px solid #d1d5db',borderRadius:'8px',fontSize:'16px',width:'90px',fontWeight:'700'}} min="0" step="0.1" placeholder="0"/>
              <span style={{fontSize:'13px',color:'#6b7280'}}>km（片道）</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
              <input type="number" value={draft.commuteRate??20} onChange={e=>setDraft(p=>({...p,commuteRate:e.target.value===''?20:Number(e.target.value)}))} style={{padding:'10px 12px',border:'1.5px solid #d1d5db',borderRadius:'8px',fontSize:'16px',width:'80px',fontWeight:'700'}} min="0" step="1"/>
              <span style={{fontSize:'13px',color:'#6b7280'}}>円/km</span>
            </div>
          </div>
          {(draft.commuteDistance||0)>0&&<p style={{fontSize:'11px',color:'#6366f1',marginTop:'6px'}}>往復{(draft.commuteDistance*2).toFixed(1)}km × {draft.commuteRate||20}円 = 1勤務日あたり¥{Math.round(draft.commuteDistance*2*(draft.commuteRate||20)).toLocaleString('ja-JP')}</p>}
        </div>
        <div style={{marginBottom:'20px'}}>
          <label style={{display:'block',fontSize:'13px',fontWeight:'700',color:'#374151',marginBottom:'10px'}}>休日扱いの設定</label>
          <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
            <label style={{display:'flex',alignItems:'center',gap:'10px',cursor:'pointer'}}>
              <Toggle value={draft.includeNationalHolidays} onChange={()=>setDraft(p=>({...p,includeNationalHolidays:!p.includeNationalHolidays}))}/>
              <span style={{fontSize:'13px',color:'#374151'}}>祝日・振替休日・国民の休日を休みにする</span>
            </label>
            <label style={{display:'flex',alignItems:'center',gap:'10px',cursor:'pointer'}}>
              <Toggle value={draft.includeYearEnd} onChange={()=>setDraft(p=>({...p,includeYearEnd:!p.includeYearEnd}))}/>
              <span style={{fontSize:'13px',color:'#374151'}}>年末年始を休みにする</span>
            </label>
            {draft.includeYearEnd&&(
              <div style={{marginLeft:'54px',background:'#f8f9ff',border:'1px solid #e0e7ff',borderRadius:'10px',padding:'12px',display:'flex',flexDirection:'column',gap:'10px'}}>
                <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
                  <span style={{fontSize:'12px',color:'#6b7280',fontWeight:'600',whiteSpace:'nowrap'}}>年末：12月</span>

              </div>
              <div style={{textAlign:'right'}}>
                <p style={{margin:0,fontSize:'15px',fontWeight:'800',color:accents[i],whiteSpace:'nowrap'}}>¥{fmt(income)}</p>
                <p style={{margin:0,fontSize:'10px',color:'#9ca3af',whiteSpace:'nowrap'}}>月平均 ¥{fmt(Math.round(income/12))}</p>
              </div>
            </div>
          );
        })}
      </div>
    </div>

    </div>
    </div>
  );
};
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
