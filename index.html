<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>パート勤務 収入計算ツール</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="収入計算" />
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; background: #f0f4ff; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { opacity: 1; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;

// インラインSVGアイコン
const IconBase = ({ d, size = 20, color = 'currentColor' }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
    style={{ flexShrink: 0 }}>
    {[].concat(d).map((path, i) => <path key={i} d={path} />)}
  </svg>
);
const Calendar    = (p) => <IconBase {...p} d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" />;
const DollarSign  = (p) => <IconBase {...p} d={["M12 2v20","M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"]} />;
const Clock       = (p) => <IconBase {...p} d={["M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2","M12 6v6l4 2"]} />;
const TrendingUp  = (p) => <IconBase {...p} d="M22 7 13.5 15.5 8.5 10.5 2 17M22 7h-6M22 7v6" />;
const Settings    = (p) => <IconBase {...p} d={["M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6","M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"]} />;
const X           = (p) => <IconBase {...p} d={["M18 6 6 18","M6 6l12 12"]} />;

const DEFAULT_SETTINGS = {
  hourlyWage: 1560,
  workHours: 5,
  workDays: [1, 2, 4, 5],
  includeYearEnd: true,
  yearEndStart: 30,
  yearStartEnd: 3,
  includeNationalHolidays: true,
  customRestDays: [],
  paymentDelay: 1,
  commuteDistance: 0, // 片道距離（km）
  commuteRate: 20,    // 1kmあたりの単価（円）
};

const DAY_LABELS = ['日', '月', '火', '水', '木', '金', '土'];
const DAY_LABELS_FULL = ['日曜', '月曜', '火曜', '水曜', '木曜', '金曜', '土曜'];

const STORAGE_KEY = 'workCalc_v4';

const Toggle = ({ value, onChange }) => (
  <div onClick={onChange} style={{ width: '44px', height: '24px', borderRadius: '12px', position: 'relative', background: value ? '#6366f1' : '#d1d5db', transition: 'background 0.2s', cursor: 'pointer', flexShrink: 0 }}>
    <div style={{ position: 'absolute', top: '3px', left: value ? '22px' : '3px', width: '18px', height: '18px', borderRadius: '50%', background: 'white', transition: 'left 0.2s', boxShadow: '0 1px 4px rgba(0,0,0,0.2)' }} />
  </div>
);

const StepInput = ({ value, onChange, borderColor }) => (
  <div style={{ display: 'flex', alignItems: 'center', gap: '3px' }}>
    <button onClick={() => onChange(Math.max(0, value - 1))}
      style={{ width: '24px', height: '24px', background: '#fee2e2', border: 'none', borderRadius: '5px', color: '#dc2626', fontWeight: '800', cursor: 'pointer', fontSize: '14px', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>−</button>
    <input type="number" value={value || ''}
      onChange={e => onChange(e.target.value === '' ? 0 : Math.max(0, Number(e.target.value)))}
      style={{ width: '36px', padding: '3px 2px', textAlign: 'center', border: `1.5px solid ${borderColor}`, borderRadius: '5px', fontSize: '12px', minWidth: 0 }}
      placeholder="0" />
    <button onClick={() => onChange(value + 1)}
      style={{ width: '24px', height: '24px', background: '#dcfce7', border: 'none', borderRadius: '5px', color: '#16a34a', fontWeight: '800', cursor: 'pointer', fontSize: '14px', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>+</button>
  </div>
);

const WorkScheduleCalculator = () => {
  const [year, setYear] = useState(2026);
  const [allYearsData, setAllYearsData] = useState({});
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [showSettings, setShowSettings] = useState(false);
  const [settingsDraft, setSettingsDraft] = useState(DEFAULT_SETTINGS);
  const [loaded, setLoaded] = useState(false);

  // 初回読み込み
  React.useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed.year) setYear(Number(parsed.year));
        if (parsed.allYearsData) setAllYearsData(parsed.allYearsData);
        if (parsed.settings) setSettings({ ...DEFAULT_SETTINGS, ...parsed.settings });
      }
    } catch (e) {}
    setLoaded(true);
  }, []);

  // データ変更時に保存
  React.useEffect(() => {
    if (!loaded) return;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ year, allYearsData, settings }));
    } catch (e) {}
  }, [year, allYearsData, settings, loaded]);

  const getJapaneseHolidays = (y) => {
    const holidays = [];
    const fixedHolidays = [
      { month: 0, day: 1 }, { month: 1, day: 11 }, { month: 1, day: 23 },
      { month: 3, day: 29 }, { month: 4, day: 3 }, { month: 4, day: 4 },
      { month: 4, day: 5 }, { month: 7, day: 11 }, { month: 10, day: 3 }, { month: 10, day: 23 }
    ];
    fixedHolidays.forEach(h => holidays.push(new Date(y, h.month, h.day)));

    const getMonday = (month, week) => {
      const date = new Date(y, month, 1);
      while (date.getDay() !== 1) date.setDate(date.getDate() + 1);
      date.setDate(date.getDate() + (week - 1) * 7);
      return new Date(date);
    };
    holidays.push(getMonday(0, 2), getMonday(6, 3), getMonday(8, 3), getMonday(9, 2));

    const vernalEquinox = Math.floor(20.8431 + 0.242194 * (y - 1980) - Math.floor((y - 1980) / 4));
    const autumnalEquinox = Math.floor(23.2488 + 0.242194 * (y - 1980) - Math.floor((y - 1980) / 4));
    holidays.push(new Date(y, 2, vernalEquinox), new Date(y, 8, autumnalEquinox));

    const substituteHolidays = [];
    holidays.forEach(holiday => {
      if (holiday.getDay() === 0) {
        let sub = new Date(holiday);
        sub.setDate(sub.getDate() + 1);
        while (holidays.some(h => h.toDateString() === sub.toDateString())) {
          sub.setDate(sub.getDate() + 1);
        }
        substituteHolidays.push(new Date(sub));
      }
    });

    const nationalHolidays = [];
    const sorted = [...holidays, ...substituteHolidays].sort((a, b) => a - b);
    for (let i = 0; i < sorted.length - 1; i++) {
      const diff = Math.floor((sorted[i + 1] - sorted[i]) / (1000 * 60 * 60 * 24));
      if (diff === 2) {
        const middle = new Date(sorted[i]);
        middle.setDate(middle.getDate() + 1);
        if (middle.getDay() !== 0 && middle.getDay() !== 6) nationalHolidays.push(new Date(middle));
      }
    }

    return [...holidays, ...substituteHolidays, ...nationalHolidays];
  };

  const getYearEndHolidays = (y, cfg = settings) => {
    const days = [];
    // 年末: 12/yearEndStart 〜 12/31
    for (let d = cfg.yearEndStart; d <= 31; d++) days.push(new Date(y, 11, d));
    // 年始: 1/2 〜 1/yearStartEnd (1/1は祝日として別処理)
    for (let d = 2; d <= cfg.yearStartEnd; d++) days.push(new Date(y, 0, d));
    return days;
  };

  const isHoliday = (date, holidays, yearEndHolidays, cfg) => {
    const day = date.getDay();
    // 勤務曜日でなければ休み
    if (!cfg.workDays.includes(day)) return true;
    const dateStr = date.toDateString();
    if (cfg.includeNationalHolidays && holidays.some(h => h.toDateString() === dateStr)) return true;
    if (cfg.includeYearEnd && yearEndHolidays.some(h => h.toDateString() === dateStr)) return true;
    if (cfg.customRestDays.some(r => {
      const rd = new Date(date.getFullYear(), r.month - 1, r.day);
      return rd.toDateString() === dateStr;
    })) return true;
    return false;
  };

  const monthlyData = allYearsData[year] || {};

  const calculateSchedule = useMemo(() => {
    const holidays = getJapaneseHolidays(year);
    const yearEndHolidays = getYearEndHolidays(year, settings);
    const { hourlyWage, workHours } = settings;
    const monthly = [];
    let totalWorkDays = 0, totalDays = 0, totalHolidayCount = 0;

    for (let month = 0; month < 12; month++) {
      const lastDay = new Date(year, month + 1, 0);
      let workDays = 0, holidayCount = 0;
      totalDays += lastDay.getDate();

      for (let day = 1; day <= lastDay.getDate(); day++) {
        const date = new Date(year, month, day);
        const dow = date.getDay();
        const dateStr = date.toDateString();
        const isNationalHoliday = holidays.some(h => h.toDateString() === dateStr) || yearEndHolidays.some(h => h.toDateString() === dateStr);
        if (isNationalHoliday && ![0, 6].includes(dow) && settings.workDays.includes(dow)) holidayCount++;
        if (!isHoliday(date, holidays, yearEndHolidays, settings)) workDays++;
      }

      totalWorkDays += workDays;
      totalHolidayCount += holidayCount;

      const monthKey = month + 1;
      const saved = monthlyData[monthKey] || {};
      const overtimeMinutes  = Number(saved.overtimeMinutes) || 0;
      const holidayDays      = Number(saved.holidayDays) || 0;
      const absentDays       = Number(saved.absentDays) || 0;
      const finalAmount      = saved.finalAmount !== undefined && saved.finalAmount !== null ? Number(saved.finalAmount) : null;
      const sideIncome       = Number(saved.sideIncome) || 0;
      const commuteOverride  = saved.commuteOverride !== undefined && saved.commuteOverride !== null ? Number(saved.commuteOverride) : null;

      const takeHomePay    = saved.takeHomePay !== undefined && saved.takeHomePay !== null ? Number(saved.takeHomePay) : null;

      const actualWorkDays  = Math.max(0, workDays - absentDays);
      const baseIncome      = actualWorkDays * workHours * hourlyWage;
      const absentDeduct    = absentDays * workHours * hourlyWage;
      const overtimeIncome  = Math.round(hourlyWage * 1.25 / 6 * overtimeMinutes);
      const holidayIncome   = Math.round(hourlyWage * 1.35 * workHours * holidayDays);
      const autoCommute     = Math.round(settings.commuteDistance * 2 * (settings.commuteRate || 20) * actualWorkDays);
      const commuteIncome   = commuteOverride !== null ? commuteOverride : autoCommute;
      const calculated      = baseIncome + overtimeIncome + holidayIncome;
      const partIncome      = finalAmount !== null ? finalAmount : calculated;

      monthly.push({ month: monthKey, workDays, actualWorkDays, absentDays, overtimeMinutes, holidayDays, baseIncome, absentDeduct, overtimeIncome, holidayIncome, autoCommute, commuteIncome, commuteOverride, calculated, finalAmount, partIncome, sideIncome, takeHomePay, total: partIncome + sideIncome + commuteIncome });
    }

    const totalPartIncome   = monthly.reduce((sum, m) => sum + m.partIncome, 0);
    const totalSideIncome   = monthly.reduce((sum, m) => sum + m.sideIncome, 0);
    const totalCommuteIncome= monthly.reduce((sum, m) => sum + m.commuteIncome, 0);
    const totalIncome       = totalPartIncome + totalSideIncome + totalCommuteIncome;

    // 支払月ベースの年間集計
    const delay = settings.paymentDelay || 0;

    // 手取り：支払が当年内（1〜12-delay月勤務分）のみ集計
    const takeHomeMonths = monthly.filter(m => m.takeHomePay !== null && m.month <= 12 - delay);
    let totalTakeHome    = takeHomeMonths.reduce((sum, m) => sum + m.takeHomePay, 0);
    let takeHomeCount    = takeHomeMonths.length;
    // 前年分（支払月ベース）の手取りも加算
    if (delay > 0) {
      const pyd = allYearsData[year - 1] || {};
      for (let pm = 13 - delay; pm <= 12; pm++) {
        const sv = pyd[pm] || {};
        if (sv.takeHomePay != null) {
          totalTakeHome += Number(sv.takeHomePay);
          takeHomeCount++;
        }
      }
    }
    let payPartIncome = 0, paySideIncome = 0, payCommuteIncome = 0;
    if (delay === 0) {
      payPartIncome    = totalPartIncome;
      paySideIncome    = totalSideIncome;
      payCommuteIncome = totalCommuteIncome;
    } else {
      const currentMonths = monthly.filter(m => m.month <= 12 - delay);
      currentMonths.forEach(m => { payPartIncome += m.partIncome; paySideIncome += m.sideIncome; payCommuteIncome += m.commuteIncome; });
      const prevYearData = allYearsData[year - 1] || {};
      for (let pm = 13 - delay; pm <= 12; pm++) {
        const prevHolidays = getJapaneseHolidays(year - 1);
        const prevYeh = getYearEndHolidays(year - 1, settings);
        const lastDay = new Date(year - 1, pm, 0);
        let prevWd = 0;
        for (let d = 1; d <= lastDay.getDate(); d++) {
          if (!isHoliday(new Date(year - 1, pm - 1, d), prevHolidays, prevYeh, settings)) prevWd++;
        }
        const sv = prevYearData[pm] || {};
        const prevAbsent  = Number(sv.absentDays) || 0;
        const prevActualWd = Math.max(0, prevWd - prevAbsent);
        const prevFinal   = sv.finalAmount != null ? Number(sv.finalAmount) : null;
        const prevBase    = prevActualWd * workHours * hourlyWage;
        const prevOTInc   = Math.round(hourlyWage * 1.25 / 6 * (Number(sv.overtimeMinutes) || 0));
        const prevHDInc   = Math.round(hourlyWage * 1.35 * workHours * (Number(sv.holidayDays) || 0));
        payPartIncome    += prevFinal !== null ? prevFinal : prevBase + prevOTInc + prevHDInc;
        paySideIncome    += Number(sv.sideIncome) || 0;
        // 交通費: commuteOverrideがあればそれを、なければ実出勤日数で自動計算
        const prevAutoCommute = Math.round(settings.commuteDistance * 2 * (settings.commuteRate || 20) * prevActualWd);
        payCommuteIncome += sv.commuteOverride != null ? Number(sv.commuteOverride) : prevAutoCommute;
      }
    }
    const payTotalIncome = payPartIncome + paySideIncome + payCommuteIncome;

    return {
      monthly,
      yearly: {
        workDays: totalWorkDays, totalDays,
        totalHolidays: totalDays - totalWorkDays,
        nationalHolidays: totalHolidayCount,
        partIncome: totalPartIncome, sideIncome: totalSideIncome, commuteIncome: totalCommuteIncome, totalIncome,
        payPartIncome, paySideIncome, payCommuteIncome, payTotalIncome,
        average: Math.round(payTotalIncome / 12),
        totalTakeHome, takeHomeCount,
        delay,
      }
    };
  }, [year, monthlyData, settings]);

  const calculateFutureIncome = (targetYear) => {
    const delay = settings.paymentDelay || 0;
    const getWd = (ty, month) => {
      const h = getJapaneseHolidays(ty);
      const ye = getYearEndHolidays(ty, settings);
      const last = new Date(ty, month, 0);
      let wd = 0;
      for (let d = 1; d <= last.getDate(); d++) {
        if (!isHoliday(new Date(ty, month - 1, d), h, ye, settings)) wd++;
      }
      return wd;
    };
    let total = 0;
    if (delay === 0) {
      for (let m = 1; m <= 12; m++) total += getWd(targetYear, m);
    } else {
      // 前年(13-delay)月〜当年(12-delay)月分
      for (let m = 13 - delay; m <= 12; m++) total += getWd(targetYear - 1, m);
      for (let m = 1; m <= 12 - delay; m++) total += getWd(targetYear, m);
    }
    return total * settings.workHours * settings.hourlyWage;
  };

  const futureYears = [1, 2, 3, 4, 5].map(offset => ({
    y: year + offset,
    income: calculateFutureIncome(year + offset),
  }));
  const formatCurrency = (num) => num.toLocaleString('ja-JP');

  const updateMonth = (month, field, value) => {
    setAllYearsData(prev => ({
      ...prev,
      [year]: { ...prev[year], [month]: { ...prev[year]?.[month], [field]: value } }
    }));
  };

  const toggleDraftWorkDay = (day) => {
    setSettingsDraft(prev => ({
      ...prev,
      workDays: prev.workDays.includes(day)
        ? prev.workDays.filter(d => d !== day)
        : [...prev.workDays, day].sort()
    }));
  };

  const openSettings = () => {
    setSettingsDraft({ ...settings });
    setShowSettings(true);
  };

  const applySettings = () => {
    if (settingsDraft.workDays.length === 0) return;
    setSettings(settingsDraft);
    setShowSettings(false);
  };

  const workDayLabel = settings.workDays.map(d => DAY_LABELS[d]).join('・') + '曜日';

  return (
    <div style={{ minHeight: '100vh', background: 'linear-gradient(135deg, #f0f4ff 0%, #e8ecff 50%, #f5f0ff 100%)', padding: '12px', fontFamily: "'Hiragino Sans', 'Yu Gothic', sans-serif" }}>
      <div style={{ maxWidth: '900px', margin: '0 auto' }}>

        {/* Header */}
        <div style={{ background: 'white', borderRadius: '16px', boxShadow: '0 4px 24px rgba(99,102,241,0.10)', padding: '16px', marginBottom: '12px' }}>
          <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', flexWrap: 'wrap', gap: '12px' }}>
            <div>
              <h1 style={{ fontSize: '24px', fontWeight: '800', color: '#1e1b4b', margin: 0, display: 'flex', alignItems: 'center', gap: '10px' }}>
                <Calendar size={28} color="#6366f1" />
                パート勤務 収入計算ツール
              </h1>
              <p style={{ color: '#6b7280', marginTop: '6px', fontSize: '13px' }}>
                勤務日: {workDayLabel}　／　{settings.workHours}時間／日　／　時給¥{formatCurrency(settings.hourlyWage)}
                {settings.includeYearEnd && <span>　／　年末年始: 12/{settings.yearEndStart}〜1/{settings.yearStartEnd}</span>}
              </p>
            </div>
            <button
              onClick={openSettings}
              style={{ display: 'flex', alignItems: 'center', gap: '6px', padding: '10px 18px', background: '#f0f0ff', border: '1.5px solid #c7d2fe', borderRadius: '10px', color: '#4f46e5', fontWeight: '600', fontSize: '13px', cursor: 'pointer' }}
            >
              <Settings size={16} /> 設定変更
            </button>
          </div>

          {/* Year selector */}
          <div style={{ marginTop: '20px', display: 'flex', alignItems: 'center', gap: '12px' }}>
            <label style={{ fontSize: '13px', color: '#6b7280', fontWeight: '600' }}>計算対象年</label>
            <input
              type="number"
              value={year}
              onChange={(e) => setYear(parseInt(e.target.value))}
              style={{ padding: '8px 14px', border: '1.5px solid #c7d2fe', borderRadius: '8px', fontSize: '15px', fontWeight: '700', color: '#1e1b4b', width: '100px', outline: 'none' }}
              min="2020" max="2050"
            />
          </div>
        </div>

        {/* Settings Modal */}
        {showSettings && (
          <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 100, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px' }}>
            <div style={{ background: 'white', borderRadius: '20px', padding: '32px', maxWidth: '480px', width: '100%', boxShadow: '0 20px 60px rgba(0,0,0,0.2)', maxHeight: '90vh', overflowY: 'auto' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '24px' }}>
                <h2 style={{ margin: 0, fontSize: '20px', fontWeight: '800', color: '#1e1b4b', display: 'flex', alignItems: 'center', gap: '8px' }}>
                  <Settings size={20} color="#6366f1" /> 勤務条件の設定
                </h2>
                <button onClick={() => setShowSettings(false)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#9ca3af' }}><X size={22} /></button>
              </div>

              {/* 時給 */}
              <div style={{ marginBottom: '22px' }}>
                <label style={{ display: 'block', fontSize: '13px', fontWeight: '700', color: '#374151', marginBottom: '8px' }}>時給（円）</label>
                <input
                  type="number"
                  value={settingsDraft.hourlyWage}
                  onChange={(e) => setSettingsDraft(p => ({ ...p, hourlyWage: Number(e.target.value) }))}
                  style={{ padding: '10px 14px', border: '1.5px solid #d1d5db', borderRadius: '8px', fontSize: '16px', width: '150px', fontWeight: '700' }}
                  min="0"
                />
              </div>

              {/* 1日の勤務時間 */}
              <div style={{ marginBottom: '22px' }}>
                <label style={{ display: 'block', fontSize: '13px', fontWeight: '700', color: '#374151', marginBottom: '8px' }}>1日の勤務時間（時間）</label>
                <input
                  type="number"
                  value={settingsDraft.workHours}
                  onChange={(e) => setSettingsDraft(p => ({ ...p, workHours: Number(e.target.value) }))}
                  style={{ padding: '10px 14px', border: '1.5px solid #d1d5db', borderRadius: '8px', fontSize: '16px', width: '100px', fontWeight: '700' }}
                  min="0.5" max="24" step="0.5"
                />
              </div>

              {/* 勤務曜日 */}
              <div style={{ marginBottom: '22px' }}>
                <label style={{ display: 'block', fontSize: '13px', fontWeight: '700', color: '#374151', marginBottom: '8px' }}>勤務曜日（複数選択可）</label>
                <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>

                        <select

                    background: settingsDraft.workDays.length === 0 ? '#e5e7eb' : '#6366f1',
                    color: settingsDraft.workDays.length === 0 ? '#9ca3af' : 'white',
                    fontWeight: '700', cursor: settingsDraft.workDays.length === 0 ? 'not-allowed' : 'pointer',
                    fontSize: '14px'
                  }}
                >適用する</button>
              </div>
            </div>
          </div>
        )}

        {/* Annual Summary */}
        <div style={{ background: 'linear-gradient(135deg, #eef2ff, #e0e7ff)', borderRadius: '16px', padding: '16px', marginBottom: '12px', border: '1px solid #c7d2fe' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '16px' }}>
            <Clock size={22} color="#6366f1" />
            <h3 style={{ margin: 0, fontSize: '16px', fontWeight: '800', color: '#1e1b4b' }}>{year}年 年間サマリー</h3>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '8px', marginBottom: '10px' }}>
            {[
              { label: '年間勤務日数', value: `${calculateSchedule.yearly.workDays}日` },
              { label: '年間休日数', value: `${calculateSchedule.yearly.totalHolidays}日` },
              { label: '祝日数', value: `${calculateSchedule.yearly.nationalHolidays}日` },

              <div key={label} style={{ background: 'white', borderRadius: '10px', padding: '10px 6px', textAlign: 'center' }}>
                <p style={{ margin: '0 0 3px', fontSize: '10px', color: '#9ca3af', fontWeight: '600' }}>{label}</p>
                <p style={{ margin: 0, fontSize: '18px', fontWeight: '800', color: '#1e1b4b' }}>{value}</p>
              </div>
            ))}
          </div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
            {settings.paymentDelay > 0 && (
              <div style={{ background: '#fef9f0', border: '1px solid #fed7aa', borderRadius: '8px', padding: '8px 12px', fontSize: '11px', color: '#92400e' }}>
                💡 支払月ベース集計（前年{13 - settings.paymentDelay}月〜当年{12 - settings.paymentDelay}月分の受取額）
              </div>
            )}
            {[
              { label: 'パート収入合計', val: calculateSchedule.yearly.payPartIncome,    color: '#6366f1', border: '#c7d2fe' },
              { label: 'その他収入合計', val: calculateSchedule.yearly.paySideIncome,    color: '#16a34a', border: '#bbf7d0' },
              ...(settings.commuteDistance > 0 ? [{ label: '交通費合計', val: calculateSchedule.yearly.payCommuteIncome, color: '#0891b2', border: '#a5f3fc' }] : []),
              { label: '年間総収入',     val: calculateSchedule.yearly.payTotalIncome,   color: '#9333ea', border: '#e9d5ff', size: '20px' },
              { label: '平均月収',       val: calculateSchedule.yearly.average,          color: '#374151', border: '#e5e7eb' },
            ].map(({ label, val, color, border, size }) => (
              <div key={label} style={{ background: 'white', borderRadius: '10px', padding: '11px 14px', border: `2px solid ${border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '8px' }}>
                <p style={{ margin: 0, fontSize: '12px', color: '#9ca3af', fontWeight: '600', whiteSpace: 'nowrap' }}>{label}</p>

                <div>
                  <p style={{ margin: 0, fontSize: '12px', color: '#9ca3af', fontWeight: '600' }}>手取り合計</p>
                  <p style={{ margin: 0, fontSize: '10px', color: '#9ca3af' }}>{calculateSchedule.yearly.takeHomeCount}ヶ月分入力済み</p>
                </div>
                <p style={{ margin: 0, fontSize: '20px', fontWeight: '800', color: '#7c3aed', whiteSpace: 'nowrap' }}>¥{formatCurrency(calculateSchedule.yearly.totalTakeHome)}</p>

        {/* Monthly Cards */}

            <DollarSign size={22} color="#6366f1" /> 月別詳細
          </h2>

          <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>

            {/* 前年12月カード（翌月払い以上の場合のみ表示） */}
            {settings.paymentDelay > 0 && (() => {
              const prevYear = year - 1;
              const prevMonths = Array.from({ length: settings.paymentDelay }, (_, i) => 12 - settings.paymentDelay + 1 + i);
              return prevMonths.map(pm => {
                const prevHolidays = getJapaneseHolidays(prevYear);
                const prevYeh = getYearEndHolidays(prevYear, settings);
                const lastDay = new Date(prevYear, pm, 0);
                let prevWd = 0;
                for (let d = 1; d <= lastDay.getDate(); d++) {
                  if (!isHoliday(new Date(prevYear, pm - 1, d), prevHolidays, prevYeh, settings)) prevWd++;
                }
                const sv = (allYearsData[prevYear] || {})[pm] || {};
                const prevOT       = Number(sv.overtimeMinutes) || 0;
                const prevHD       = Number(sv.holidayDays) || 0;
                const prevAbsent   = Number(sv.absentDays) || 0;
                const prevActualWd = Math.max(0, prevWd - prevAbsent);
                const prevFinal    = sv.finalAmount != null ? Number(sv.finalAmount) : null;
                const prevSide     = Number(sv.sideIncome) || 0;
                const prevCO       = sv.commuteOverride != null ? Number(sv.commuteOverride) : null;
                const prevBase     = prevActualWd * settings.workHours * settings.hourlyWage;
                const prevAbsentDeduct = prevAbsent * settings.workHours * settings.hourlyWage;
                const prevOTInc    = Math.round(settings.hourlyWage * 1.25 / 6 * prevOT);
                const prevHDInc   = Math.round(settings.hourlyWage * 1.35 * settings.workHours * prevHD);
                const prevCalc    = prevBase + prevOTInc + prevHDInc;
                const prevPart    = prevFinal !== null ? prevFinal : prevCalc;
                const prevAutoC    = Math.round(settings.commuteDistance * 2 * (settings.commuteRate || 20) * prevActualWd);
                const prevCommute  = prevCO !== null ? prevCO : prevAutoC;
                const prevTotal    = prevPart + prevSide + prevCommute;

                const updatePrevMonth = (field, value) => {
                  setAllYearsData(prev => ({
                    ...prev,
                    [prevYear]: { ...prev[prevYear], [pm]: { ...prev[prevYear]?.[pm], [field]: value } }
                  }));
                };

                return (
                  <div key={`prev-${pm}`} style={{ border: '2px solid #fcd34d', borderRadius: '12px', overflow: 'hidden', background: '#fffdf5' }}>
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 14px', background: '#fef9e7', borderBottom: '1px solid #fcd34d', flexWrap: 'wrap', gap: '4px' }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '5px', flexWrap: 'nowrap' }}>
                        <span style={{ fontWeight: '800', fontSize: '16px', color: '#92400e', whiteSpace: 'nowrap' }}>{prevYear}年{pm}月</span>
                        <span style={{ fontSize: '10px', color: '#b45309', background: 'white', border: '1px solid #fcd34d', borderRadius: '8px', padding: '2px 5px', whiteSpace: 'nowrap' }}>
                          支払{((pm - 1 + settings.paymentDelay) % 12) + 1}月
                        </span>
                        <span style={{ fontSize: '10px', color: '#b45309', background: '#fef3c7', borderRadius: '6px', padding: '2px 5px', whiteSpace: 'nowrap' }}>前年分</span>
                      </div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                        <span style={{ fontSize: '11px', color: prevAbsent > 0 ? '#dc2626' : '#92400e', whiteSpace: 'nowrap' }}>
                          勤務 {prevActualWd}日{prevAbsent > 0 ? ` (欠勤${prevAbsent}日)` : ''}
                        </span>
                        <span style={{ fontWeight: '800', fontSize: '15px', color: '#b45309', whiteSpace: 'nowrap' }}>¥{formatCurrency(prevTotal)}</span>
                      </div>
                    </div>
                    {/* 欠勤行 */}
                    <div style={{ padding: '8px 14px', background: '#fef2f2', borderBottom: '1px solid #f0f0f0', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '8px' }}>
                      <div style={{ display: 'flex', flexDirection: 'column', gap: '1px' }}>
                        <span style={{ fontSize: '10px', color: '#dc2626', fontWeight: '600' }}>欠勤</span>
                        {prevAbsent > 0 && <span style={{ fontSize: '10px', color: '#9ca3af' }}>−¥{formatCurrency(prevAbsentDeduct)}</span>}
                      </div>
                      <StepInput value={prevAbsent} onChange={v => updatePrevMonth('absentDays', Math.min(v, prevWd))} borderColor="#fca5a5" />
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr' }}>
                      <div style={{ padding: '10px 8px', borderRight: '1px solid #f0f0f0', display: 'flex', flexDirection: 'column', gap: '4px', alignItems: 'center', background: '#fef9f0' }}>
                        <span style={{ fontSize: '10px', color: '#9ca3af', fontWeight: '600' }}>時間外（10分単位）</span>
                        <StepInput value={prevOT} onChange={v => updatePrevMonth('overtimeMinutes', v)} borderColor="#fed7aa" />
                        <span style={{ fontSize: '10px', color: '#ea580c', fontWeight: '600' }}>{prevOT * 10}分 → ¥{formatCurrency(prevOTInc)}</span>
                      </div>
                      <div style={{ padding: '10px 8px', display: 'flex', flexDirection: 'column', gap: '4px', alignItems: 'center', background: '#fff1f2' }}>
                        <span style={{ fontSize: '10px', color: '#9ca3af', fontWeight: '600' }}>休日出勤（日数）</span>
                        <StepInput value={prevHD} onChange={v => updatePrevMonth('holidayDays', v)} borderColor="#fda4af" />
                        <span style={{ fontSize: '10px', color: '#e11d48', fontWeight: '600' }}>{prevHD}日 → ¥{formatCurrency(prevHDInc)}</span>
                      </div>
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', borderTop: '1px solid #f0f0f0' }}>
                      <div style={{ padding: '10px 8px', borderRight: '1px solid #f0f0f0', background: '#fffdf5', display: 'flex', flexDirection: 'column', gap: '4px', alignItems: 'center' }}>
                        <span style={{ fontSize: '10px', color: '#9ca3af', fontWeight: '600' }}>最終調整額</span>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '2px', width: '100%', justifyContent: 'center' }}>
                          <span style={{ fontSize: '10px', color: '#9ca3af', flexShrink: 0 }}>¥</span>
                          <input type="number" value={prevFinal !== null ? prevFinal : ''}
                            onChange={e => updatePrevMonth('finalAmount', e.target.value === '' ? null : Number(e.target.value))}
                            style={{ width: '100%', maxWidth: '80px', padding: '3px 4px', textAlign: 'center', border: '1.5px solid #fcd34d', borderRadius: '5px', fontSize: '12px', minWidth: 0 }} placeholder="自動" />
                        </div>
                        <span style={{ fontSize: '10px', color: '#b45309' }}>¥{formatCurrency(prevPart)}</span>
                      </div>
                      <div style={{ padding: '10px 8px', background: '#f7fef9', display: 'flex', flexDirection: 'column', gap: '4px', alignItems: 'center' }}>
                        <span style={{ fontSize: '10px', color: '#9ca3af', fontWeight: '600' }}>その他収入</span>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '2px', width: '100%', justifyContent: 'center' }}>
                          <span style={{ fontSize: '10px', color: '#9ca3af', flexShrink: 0 }}>¥</span>
                          <input type="number" value={prevSide || ''}
                            onChange={e => updatePrevMonth('sideIncome', e.target.value === '' ? 0 : Number(e.target.value))}
                            style={{ width: '100%', maxWidth: '80px', padding: '3px 4px', textAlign: 'center', border: '1.5px solid #86efac', borderRadius: '5px', fontSize: '12px', minWidth: 0 }} placeholder="0" />
                        </div>
                        <span style={{ fontSize: '10px', color: '#16a34a' }}>¥{formatCurrency(prevSide)}</span>
                      </div>
                    </div>
                    {settings.commuteDistance > 0 && (() => {
                      const dayUnit = Math.round(settings.commuteDistance * 2 * (settings.commuteRate || 20));
                      const current = prevCO !== null ? prevCO : prevAutoC;
                      const diff = current - prevAutoC;
                      const diffDays = dayUnit > 0 ? Math.round(diff / dayUnit) : 0;
                      return (
                        <div style={{ padding: '8px 14px', background: '#ecfeff', borderTop: '1px solid #f0f0f0', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '8px' }}>
                          <div style={{ display: 'flex', flexDirection: 'column', gap: '1px', flexShrink: 0 }}>
                            <span style={{ fontSize: '10px', color: '#0891b2', fontWeight: '600' }}>交通費</span>
                            <span style={{ fontSize: '10px', color: prevCO !== null && diffDays !== 0 ? (diffDays < 0 ? '#dc2626' : '#16a34a') : '#9ca3af' }}>
                              {prevCO !== null && diffDays !== 0
                                ? `${diffDays > 0 ? '+' : ''}${diffDays}日 (${diff > 0 ? '+' : ''}¥${formatCurrency(diff)})`
                                : `${Math.round(current / (dayUnit || 1))}日分`}
                            </span>
                          </div>
                          <div style={{ display: 'flex', alignItems: 'center', gap: '3px' }}>
                            <button onClick={() => updatePrevMonth('commuteOverride', Math.max(0, current - dayUnit))}
                              style={{ width: '24px', height: '24px', background: '#fee2e2', border: 'none', borderRadius: '5px', color: '#dc2626', fontWeight: '800', cursor: 'pointer', fontSize: '14px', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>−</button>
                            <span style={{ fontSize: '13px', fontWeight: '800', color: prevCO !== null ? '#0891b2' : '#9ca3af', whiteSpace: 'nowrap', minWidth: '70px', textAlign: 'center' }}>
                              ¥{formatCurrency(current)}
                            </span>
                            <button onClick={() => updatePrevMonth('commuteOverride', current + dayUnit)}
                              style={{ width: '24px', height: '24px', background: '#dcfce7', border: 'none', borderRadius: '5px', color: '#16a34a', fontWeight: '800', cursor: 'pointer', fontSize: '14px', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>+</button>
                            {prevCO !== null && (
                              <button onClick={() => updatePrevMonth('commuteOverride', null)}
                                style={{ fontSize: '10px', color: '#9ca3af', background: 'white', border: '1px solid #e5e7eb', borderRadius: '5px', padding: '2px 5px', cursor: 'pointer', whiteSpace: 'nowrap', flexShrink: 0 }}>戻す</button>
                            )}
                          </div>
                        </div>
                      );
                    })()}
                    {/* 手取り入力行 */}
                    {(() => {
                      const prevTHP = (allYearsData[prevYear] || {})[pm]?.takeHomePay;
                      const prevTakeHome = prevTHP !== undefined && prevTHP !== null ? Number(prevTHP) : null;
                      return (
                        <div style={{ padding: '8px 14px', background: '#f5f3ff', borderTop: '1px solid #ede9fe', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '8px' }}>
                          <div style={{ display: 'flex', flexDirection: 'column', gap: '1px' }}>
                            <span style={{ fontSize: '10px', color: '#7c3aed', fontWeight: '600' }}>手取り額</span>
                            <span style={{ fontSize: '10px', color: '#9ca3af' }}>{prevTakeHome === null ? '未入力（集計除外）' : `¥${formatCurrency(prevTakeHome)}`}</span>
                          </div>
                          <div style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                            <span style={{ fontSize: '10px', color: '#9ca3af', flexShrink: 0 }}>¥</span>
                            <input type="number" value={prevTakeHome !== null ? prevTakeHome : ''}
                              onChange={e => updatePrevMonth('takeHomePay', e.target.value === '' ? null : Number(e.target.value))}
                              style={{ width: '110px', padding: '4px 6px', textAlign: 'center', border: '1.5px solid #c4b5fd', borderRadius: '5px', fontSize: '13px', fontWeight: '700', color: '#7c3aed' }} placeholder="手入力" />
                          </div>
                        </div>
                      );
                    })()}
                  </div>
                );
              });
            })()}

            {/* 当年月別カード */}
            {calculateSchedule.monthly.map((data, idx) => (
              <div key={data.month} style={{ border: '1.5px solid #e5e7eb', borderRadius: '12px', overflow: 'hidden', background: idx % 2 === 0 ? 'white' : '#fafafa' }}>
                {/* 月ヘッダー行 */}
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 14px', background: idx % 2 === 0 ? '#f8f9ff' : '#f3f4f6', borderBottom: '1px solid #e5e7eb', flexWrap: 'wrap', gap: '4px' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '5px', flexWrap: 'nowrap' }}>
                    <span style={{ fontWeight: '800', fontSize: '16px', color: '#1e1b4b', whiteSpace: 'nowrap' }}>{data.month}月</span>
                    {settings.paymentDelay > 0 && (
                      <span style={{ fontSize: '10px', color: '#9ca3af', background: 'white', border: '1px solid #e5e7eb', borderRadius: '8px', padding: '2px 5px', whiteSpace: 'nowrap' }}>
                        支払{((data.month - 1 + settings.paymentDelay) % 12) + 1}月
                      </span>
                    )}
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                    <span style={{ fontSize: '11px', color: data.absentDays > 0 ? '#dc2626' : '#6b7280', whiteSpace: 'nowrap' }}>
                      勤務 {data.actualWorkDays}日{data.absentDays > 0 ? ` (欠勤${data.absentDays}日)` : ''}
                    </span>
                    <span style={{ fontWeight: '800', fontSize: '15px', color: '#7c3aed', whiteSpace: 'nowrap' }}>¥{formatCurrency(data.total)}</span>
                  </div>
                </div>
                {/* 欠勤行 */}
                {(data.absentDays > 0 || true) && (
                  <div style={{ padding: '8px 14px', background: '#fef2f2', borderBottom: '1px solid #f0f0f0', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '8px' }}>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '1px' }}>
                      <span style={{ fontSize: '10px', color: '#dc2626', fontWeight: '600' }}>欠勤</span>
                      {data.absentDays > 0 && <span style={{ fontSize: '10px', color: '#9ca3af' }}>−¥{formatCurrency(data.absentDeduct)}</span>}
                    </div>
                    <StepInput value={data.absentDays || 0} onChange={v => updateMonth(data.month, 'absentDays', Math.min(v, data.workDays))} borderColor="#fca5a5" />
                  </div>
                )}
                {/* 入力行1: 時間外・休日出勤 */}
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0', borderTop: 'none' }}>
                  {/* 時間外（10分単位） */}
                  <div style={{ padding: '10px 8px', borderRight: '1px solid #f0f0f0', display: 'flex', flexDirection: 'column', gap: '4px', alignItems: 'center', background: '#fef9f0' }}>
                    <span style={{ fontSize: '10px', color: '#9ca3af', fontWeight: '600' }}>時間外（10分単位）</span>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '3px' }}>
                      <button onClick={() => updateMonth(data.month, 'overtimeMinutes', Math.max(0, (data.overtimeMinutes || 0) - 1))}
                        style={{ width: '24px', height: '24px', background: '#fee2e2', border: 'none', borderRadius: '5px', color: '#dc2626', fontWeight: '800', cursor: 'pointer', fontSize: '14px', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>−</button>
                      <input type="number" value={data.overtimeMinutes || ''}
                        onChange={(e) => updateMonth(data.month, 'overtimeMinutes', e.target.value === '' ? 0 : Math.max(0, Number(e.target.value)))}
                        style={{ width: '36px', padding: '3px 2px', textAlign: 'center', border: '1.5px solid #fed7aa', borderRadius: '5px', fontSize: '12px', minWidth: 0 }}
                        placeholder="0" />
                      <button onClick={() => updateMonth(data.month, 'overtimeMinutes', (data.overtimeMinutes || 0) + 1)}
                        style={{ width: '24px', height: '24px', background: '#dcfce7', border: 'none', borderRadius: '5px', color: '#16a34a', fontWeight: '800', cursor: 'pointer', fontSize: '14px', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>+</button>
                    </div>
                    <span style={{ fontSize: '10px', color: '#ea580c', fontWeight: '600' }}>
                      {(data.overtimeMinutes || 0) * 10}分 → ¥{formatCurrency(data.overtimeIncome)}
                    </span>
                  </div>
                  {/* 休日出勤 */}
                  <div style={{ padding: '10px 8px', display: 'flex', flexDirection: 'column', gap: '4px', alignItems: 'center', background: '#fff1f2' }}>
                    <span style={{ fontSize: '10px', color: '#9ca3af', fontWeight: '600' }}>休日出勤（日数）</span>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '3px' }}>
                      <button onClick={() => updateMonth(data.month, 'holidayDays', Math.max(0, (data.holidayDays || 0) - 1))}
                        style={{ width: '24px', height: '24px', background: '#fee2e2', border: 'none', borderRadius: '5px', color: '#dc2626', fontWeight: '800', cursor: 'pointer', fontSize: '14px', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>−</button>
                      <input type="number" value={data.holidayDays || ''}
                        onChange={(e) => updateMonth(data.month, 'holidayDays', e.target.value === '' ? 0 : Math.max(0, Number(e.target.value)))}
                        style={{ width: '36px', padding: '3px 2px', textAlign: 'center', border: '1.5px solid #fda4af', borderRadius: '5px', fontSize: '12px', minWidth: 0 }}
                        placeholder="0" />
                      <button onClick={() => updateMonth(data.month, 'holidayDays', (data.holidayDays || 0) + 1)}
                        style={{ width: '24px', height: '24px', background: '#dcfce7', border: 'none', borderRadius: '5px', color: '#16a34a', fontWeight: '800', cursor: 'pointer', fontSize: '14px', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>+</button>
                    </div>
                    <span style={{ fontSize: '10px', color: '#e11d48', fontWeight: '600' }}>
                      {data.holidayDays || 0}日 → ¥{formatCurrency(data.holidayIncome)}
                    </span>
                  </div>
                </div>
                {/* 入力行2: 最終調整額・その他収入 */}
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0', borderTop: '1px solid #f0f0f0' }}>
                  {/* 最終調整額 */}
                  <div style={{ padding: '10px 8px', borderRight: '1px solid #f0f0f0', background: '#fffdf5', display: 'flex', flexDirection: 'column', gap: '4px', alignItems: 'center' }}>
                    <span style={{ fontSize: '10px', color: '#9ca3af', fontWeight: '600' }}>最終調整額</span>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '2px', width: '100%', justifyContent: 'center' }}>
                      <span style={{ fontSize: '10px', color: '#9ca3af', flexShrink: 0 }}>¥</span>
                      <input type="number" value={data.finalAmount !== null ? data.finalAmount : ''}
                        onChange={(e) => updateMonth(data.month, 'finalAmount', e.target.value === '' ? null : Number(e.target.value))}
                        style={{ width: '100%', maxWidth: '80px', padding: '3px 4px', textAlign: 'center', border: '1.5px solid #fcd34d', borderRadius: '5px', fontSize: '12px', minWidth: 0 }}
                        placeholder="自動" />
                    </div>
                    <span style={{ fontSize: '10px', color: '#b45309' }}>¥{formatCurrency(data.partIncome)}</span>
                  </div>
                  {/* その他収入 */}
                  <div style={{ padding: '10px 8px', background: '#f7fef9', display: 'flex', flexDirection: 'column', gap: '4px', alignItems: 'center' }}>
                    <span style={{ fontSize: '10px', color: '#9ca3af', fontWeight: '600' }}>その他収入</span>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '2px', width: '100%', justifyContent: 'center' }}>
                      <span style={{ fontSize: '10px', color: '#9ca3af', flexShrink: 0 }}>¥</span>
                      <input type="number" value={data.sideIncome || ''}
                        onChange={(e) => updateMonth(data.month, 'sideIncome', e.target.value === '' ? 0 : Number(e.target.value))}
                        style={{ width: '100%', maxWidth: '80px', padding: '3px 4px', textAlign: 'center', border: '1.5px solid #86efac', borderRadius: '5px', fontSize: '12px', minWidth: 0 }}
                        placeholder="0" />
                    </div>
                    <span style={{ fontSize: '10px', color: '#16a34a' }}>¥{formatCurrency(data.sideIncome || 0)}</span>
                  </div>
                </div>
                {/* 交通費（設定時のみ表示） */}
                {settings.commuteDistance > 0 && (() => {
                  const dayUnit = Math.round(settings.commuteDistance * 2 * (settings.commuteRate || 20));
                  const current = data.commuteOverride !== null ? data.commuteOverride : data.autoCommute;
                  const diff = current - data.autoCommute;
                  const diffDays = dayUnit > 0 ? Math.round(diff / dayUnit) : 0;
                  return (
                    <div style={{ padding: '8px 14px', background: '#ecfeff', borderTop: '1px solid #f0f0f0', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '8px' }}>
                      <div style={{ display: 'flex', flexDirection: 'column', gap: '1px', flexShrink: 0 }}>
                        <span style={{ fontSize: '10px', color: '#0891b2', fontWeight: '600' }}>交通費</span>
                        <span style={{ fontSize: '10px', color: data.commuteOverride !== null && diffDays !== 0 ? (diffDays < 0 ? '#dc2626' : '#16a34a') : '#9ca3af' }}>
                          {data.commuteOverride !== null && diffDays !== 0
                            ? `${diffDays > 0 ? '+' : ''}${diffDays}日 (${diff > 0 ? '+' : ''}¥${formatCurrency(diff)})`
                            : `${Math.round(current / (dayUnit || 1))}日分`}
                        </span>
                      </div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '3px' }}>
                        <button onClick={() => updateMonth(data.month, 'commuteOverride', Math.max(0, current - dayUnit))}
                          style={{ width: '24px', height: '24px', background: '#fee2e2', border: 'none', borderRadius: '5px', color: '#dc2626', fontWeight: '800', cursor: 'pointer', fontSize: '14px', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>−</button>
                        <span style={{ fontSize: '13px', fontWeight: '800', color: data.commuteOverride !== null ? '#0891b2' : '#9ca3af', whiteSpace: 'nowrap', minWidth: '60px', textAlign: 'center' }}>
                          ¥{formatCurrency(current)}
                        </span>
                        <button onClick={() => updateMonth(data.month, 'commuteOverride', current + dayUnit)}
                          style={{ width: '24px', height: '24px', background: '#dcfce7', border: 'none', borderRadius: '5px', color: '#16a34a', fontWeight: '800', cursor: 'pointer', fontSize: '14px', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>+</button>
                        {data.commuteOverride !== null && (
                          <button onClick={() => updateMonth(data.month, 'commuteOverride', null)}
                            style={{ fontSize: '10px', color: '#9ca3af', background: 'white', border: '1px solid #e5e7eb', borderRadius: '5px', padding: '2px 5px', cursor: 'pointer', whiteSpace: 'nowrap', flexShrink: 0 }}>戻す</button>
                        )}
                      </div>
                    </div>
                  );
                })()}
                {/* 手取り入力行（翌年払いの月は非表示） */}
                {data.month <= 12 - (settings.paymentDelay || 0) && (
                  <div style={{ padding: '8px 14px', background: '#f5f3ff', borderTop: '1px solid #ede9fe', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '8px' }}>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '1px' }}>
                      <span style={{ fontSize: '10px', color: '#7c3aed', fontWeight: '600' }}>手取り額</span>
                      <span style={{ fontSize: '10px', color: '#9ca3af' }}>{data.takeHomePay === null ? '未入力（集計除外）' : `¥${formatCurrency(data.takeHomePay)}`}</span>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                      <span style={{ fontSize: '10px', color: '#9ca3af', flexShrink: 0 }}>¥</span>
                      <input type="number" value={data.takeHomePay !== null ? data.takeHomePay : ''}
                        onChange={e => updateMonth(data.month, 'takeHomePay', e.target.value === '' ? null : Number(e.target.value))}
                        style={{ width: '110px', padding: '4px 6px', textAlign: 'center', border: '1.5px solid #c4b5fd', borderRadius: '5px', fontSize: '13px', fontWeight: '700', color: '#7c3aed' }} placeholder="手入力" />
                    </div>
                  </div>
                )}
              </div>
            ))}

            {/* 年間合計 */}
            <div style={{ border: '2px solid #c7d2fe', borderRadius: '12px', background: '#f0f4ff', padding: '14px 16px' }}>
              <span style={{ fontWeight: '800', fontSize: '14px', color: '#1e1b4b', display: 'block', marginBottom: '8px' }}>
                年間合計{settings.paymentDelay > 0 ? '（支払月ベース）' : ''}
              </span>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                {[
                  { label: 'パート収入', val: calculateSchedule.yearly.payPartIncome,    color: '#6366f1' },
                  { label: 'その他収入', val: calculateSchedule.yearly.paySideIncome,    color: '#16a34a' },
                  ...(settings.commuteDistance > 0 ? [{ label: '交通費', val: calculateSchedule.yearly.payCommuteIncome, color: '#0891b2' }] : []),
                  { label: '総収入',     val: calculateSchedule.yearly.payTotalIncome,   color: '#7c3aed' },
                ].map(({ label, val, color }) => (
                  <div key={label} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <p style={{ margin: 0, fontSize: '11px', color: '#9ca3af', fontWeight: '600' }}>{label}</p>
                    <p style={{ margin: 0, fontWeight: '800', fontSize: '14px', color, whiteSpace: 'nowrap' }}>¥{formatCurrency(val)}</p>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>

        {/* Future income */}
        <div style={{ background: 'white', borderRadius: '16px', boxShadow: '0 4px 24px rgba(99,102,241,0.10)', padding: '16px' }}>
          <h2 style={{ fontSize: '16px', fontWeight: '800', color: '#1e1b4b', marginBottom: '2px', display: 'flex', alignItems: 'center', gap: '8px' }}>
            <TrendingUp size={20} color="#6366f1" /> 来年以降の予想年収
          </h2>
          <p style={{ fontSize: '11px', color: '#9ca3af', marginBottom: '16px' }}>※ 調整・手当なしの基本勤務での予想です</p>

          {/* カードリスト */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
            {futureYears.map(({ y, income }, i) => {
              const labels = ['来年', '再来年', '3年後', '4年後', '5年後'];
              const accents = ['#6366f1', '#7c3aed', '#2563eb', '#0891b2', '#059669'];
              const bgs = ['#f5f3ff', '#f0f4ff', '#eff6ff', '#ecfeff', '#f0fdf4'];
              const borders = ['#ddd6fe', '#c7d2fe', '#bfdbfe', '#a5f3fc', '#bbf7d0'];
              return (
                <div key={y} style={{
                  display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                  background: bgs[i], border: `1.5px solid ${borders[i]}`,
                  borderRadius: '10px', padding: '10px 14px',
                }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                    <div style={{ width: '8px', height: '8px', borderRadius: '50%', background: accents[i], flexShrink: 0 }} />
                    <div>
                      <span style={{ fontSize: '13px', fontWeight: '800', color: '#1e1b4b' }}>{y}年</span>
                      <span style={{ marginLeft: '6px', fontSize: '10px', background: 'white', color: accents[i], border: `1px solid ${borders[i]}`, borderRadius: '10px', padding: '1px 7px', fontWeight: '700' }}>{labels[i]}</span>
                    </div>
                  </div>
                  <div style={{ textAlign: 'right' }}>
                    <p style={{ margin: 0, fontSize: '15px', fontWeight: '800', color: accents[i] }}>¥{formatCurrency(income)}</p>
                    <p style={{ margin: 0, fontSize: '10px', color: '#9ca3af' }}>月平均 ¥{formatCurrency(Math.round(income / 12))}</p>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<WorkScheduleCalculator />);
</script>
<script>
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'work-calc-v5';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll([
        './', './index.html',
        'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js'
      ]).catch(() => {})));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys =>
        Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
      ));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r =>
        r || fetch(e.request).then(res => {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
          return res;
        })
      ));
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}
</script>
</body>
</html>
